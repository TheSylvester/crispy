# ============================================================================
# Publish Crispy to OpenVSX
# ============================================================================
#
# Trigger:  Push a version tag (v0.1.5, v0.2.0, etc.)
# Flow:     Build → Package VSIX → Publish to OpenVSX → GitHub Release
#
# Usage:
#   git tag v0.1.5
#   git push --follow-tags
#
# Required secrets (set in GitHub → Settings → Secrets → Actions):
#   OVSX_TOKEN  — OpenVSX access token (get from open-vsx.org → User Settings)
#
# ============================================================================

# ── Trigger ──────────────────────────────────────────────────────────────────
# "on" defines WHEN this workflow runs.
# push.tags means: only when a tag matching "v*" is pushed (v0.1.5, v1.0.0…).
# Regular commits to main do NOT trigger this — only tags.
on:
  push:
    tags:
      - "v*"

# ── Permissions ──────────────────────────────────────────────────────────────
# This workflow needs to create GitHub Releases (write to "contents").
# Minimal permissions — only what's needed.
permissions:
  contents: write

# ── Jobs ─────────────────────────────────────────────────────────────────────
# Today: one job, universal build (no native modules).
# When you add SQLite: replace with a matrix build (see bottom of file).
jobs:
  publish:
    # "runs-on" picks the virtual machine OS.
    # ubuntu-latest is cheapest and fastest. Fine for universal (non-native) builds.
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Check out the code ──────────────────────────────────────
      # actions/checkout is a premade action that clones your repo.
      # Without this, the runner has an empty filesystem.
      - uses: actions/checkout@v4

      # ── Step 2: Set up Node.js ──────────────────────────────────────────
      # The runner has Node.js, but this lets you pin a specific version
      # and enables npm caching (faster installs on repeat runs).
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Step 3: Install dependencies ────────────────────────────────────
      # "npm ci" is like "npm install" but:
      #   - Uses package-lock.json exactly (no surprise upgrades)
      #   - Faster (skips the dependency resolution step)
      #   - Fails if lock file is out of sync (catches mistakes)
      # Always use "npm ci" in CI. "npm install" is for local dev.
      - run: npm ci

      # ── Step 4: Type check ─────────────────────────────────────────────
      # Catch type errors before packaging. If this fails, the whole
      # workflow stops — no broken builds get published.
      - run: npm run typecheck

      # ── Step 5: Run tests ──────────────────────────────────────────────
      # test:unit is CI-safe (doesn't need local transcript fixtures).
      - run: npm run test:unit

      # ── Step 6: Build ──────────────────────────────────────────────────
      - run: npm run build

      # ── Step 7: Package VSIX ───────────────────────────────────────────
      # Creates crispy-<version>.vsix in the working directory.
      # No --target flag = universal VSIX (works on all platforms).
      - run: npx vsce package

      # ── Step 8: Publish to OpenVSX ─────────────────────────────────────
      # npx ovsx = the OpenVSX CLI. Uploads the .vsix file.
      # ${{ secrets.OVSX_TOKEN }} is read from your repo's encrypted secrets.
      # It's never printed in logs — GitHub redacts it automatically.
      - run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}

      # ── Step 9: Attach VSIX to a GitHub Release ────────────────────────
      # This creates a "Release" on GitHub's Releases page with the VSIX
      # attached as a downloadable file. Users who don't use OpenVSX can
      # grab it directly.
      # "softprops/action-gh-release" is a community action that handles
      # creating the release and uploading files.
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true


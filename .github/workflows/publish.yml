# ============================================================================
# Publish Crispy to OpenVSX — Platform-specific builds
# ============================================================================
#
# Trigger:  Push a version tag (v0.1.5, v0.2.0, etc.)
# Flow:     Matrix build (per-platform) → Publish all VSIXs → GitHub Release
#
# Each platform job installs onnxruntime-node (which bundles all platform
# binaries), then package-vsix.mjs prunes to keep only the target platform's
# native files — with CUDA/TensorRT excluded (CPU-only voice inference).
#
# Note: darwin-x64 builds on macos-latest (ARM64). This works because
# onnxruntime-node ships pre-built binaries for all platforms regardless of
# the host, and package-vsix.mjs prunes to the target — no native compilation.
#
# Usage:
#   git tag v0.1.5
#   git push --follow-tags
#
# Required secrets (set in GitHub → Settings → Secrets → Actions):
#   OVSX_TOKEN  — OpenVSX access token (get from open-vsx.org → User Settings)
#
# ============================================================================

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# ── Jobs ─────────────────────────────────────────────────────────────────────
jobs:

  # ── Build: one job per platform ──────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: linux-x64 }
          - { os: ubuntu-24.04-arm, target: linux-arm64 }
          - { os: macos-latest,     target: darwin-x64 }
          - { os: macos-latest,     target: darwin-arm64 }
          - { os: windows-latest,   target: win32-x64 }
          - { os: windows-latest,   target: win32-arm64 }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci installs all deps; onnxruntime-node bundles all platform
      # binaries. CUDA download is skipped via .npmrc config.
      - run: npm ci

      - run: npm run typecheck

      - run: npm run test:unit

      - run: npm run build

      # package-vsix.mjs prunes .vscodeignore to keep only the target
      # platform's native binaries and exclude CUDA/TensorRT providers.
      - run: npm run package:${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"

  # ── Tauri: build Windows installer ────────────────────────────────────────
  build-tauri:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - run: npm ci

      - run: npm run build

      - name: Install Tauri deps
        working-directory: tauri
        run: npm install

      - name: Bundle runtime
        working-directory: tauri
        run: pwsh scripts/bundle-runtime.ps1

      - name: Build Tauri app
        working-directory: tauri
        run: npx tauri build 2>&1
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-installer
          path: tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ── Publish: collect all VSIXs + Tauri installer and release ─────────────
  publish:
    needs: [build, build-tauri]
    # Run even if some matrix jobs fail — publish whichever artifacts were built.
    # Skip only if the entire build was cancelled.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          path: vsix
          pattern: vsix-*
          merge-multiple: true

      - name: Download Tauri artifacts (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: tauri
          pattern: tauri-*
          merge-multiple: true

      - name: List collected artifacts
        run: |
          echo "=== VSIX ==="
          ls -lh vsix/ || echo "No VSIX artifacts found"
          echo "=== Tauri ==="
          ls -lh tauri/ 2>/dev/null || echo "No Tauri artifacts (build may have failed)"

      - name: Publish to OpenVSX
        run: |
          shopt -s nullglob
          files=(vsix/*.vsix)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No VSIX files found — all builds failed"
            exit 1
          fi
          failed=0
          for f in "${files[@]}"; do
            echo "Publishing $f"
            npx ovsx publish "$f" -p ${{ secrets.OVSX_TOKEN }} || { echo "::warning::Failed to publish $f"; failed=$((failed+1)); }
          done
          if [ $failed -eq ${#files[@]} ]; then
            echo "::error::All publishes failed"
            exit 1
          fi

      - name: Collect release files
        run: |
          mkdir -p release-files
          cp vsix/*.vsix release-files/ 2>/dev/null || true
          cp tauri/*.exe release-files/ 2>/dev/null || true
          ls -lh release-files/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true

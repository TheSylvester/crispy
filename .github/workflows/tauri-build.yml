# ============================================================================
# Tauri Build — Build Windows installer for testing
# ============================================================================
#
# Trigger:  Manual dispatch only
# Purpose:  Build the Tauri desktop app on Windows and upload the installer
#           as a downloadable artifact. For bootstrapping — not for releases.
#
# ============================================================================

name: Tauri Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Install npm dependencies (root)
        run: npm ci

      - name: Build crispy-code
        run: npm run build

      - name: Install Tauri CLI
        working-directory: tauri
        run: npm install

      - name: Bundle runtime
        working-directory: tauri
        run: pwsh scripts/bundle-runtime.ps1

      - name: Build Tauri app
        working-directory: tauri
        run: npx tauri build 2>&1
        env:
          # Skip updater signing — no key yet
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: crispy-windows-installer
          path: tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
